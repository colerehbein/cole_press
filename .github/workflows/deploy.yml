name: Build & Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1) R toolchain
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'

      # 2) System libraries
      - name: Install system libs for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      # 3) Install R deps
      - name: Install R deps
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1

      # 4) Quarto CLI
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      # 5) Clone and build CV (just PDF)
      - name: Clone CV repo
        run: git clone https://github.com/colerehbein/cv.git ../cv

      - name: Build CV PDF
        run: |
          cd ../cv
          quarto add mps9506/quarto-cv --no-prompt
          quarto render CV.qmd --to pdf
          ls -la

      # 6) Render main site
      - name: Render site
        run: quarto render

      # 7) Copy CV PDF to site root
      - name: Copy CV PDF
        run: |
          # Check both possible locations for the PDF
          if [ -f ../cv/_site/CV.pdf ]; then
            cp ../cv/_site/CV.pdf _site/CV.pdf
            echo "CV.pdf copied from _site/ to _site/"
          elif [ -f ../cv/CV.pdf ]; then
            cp ../cv/CV.pdf _site/CV.pdf
            echo "CV.pdf copied from cv root to _site/"
          else
            echo "ERROR: CV.pdf not found"
            echo "Contents of ../cv:"
            ls -la ../cv/
            echo "Contents of ../cv/_site:"
            ls -la ../cv/_site/ 2>/dev/null || echo "_site does not exist"
            exit 1
          fi
          ls -la _site/CV.pdf

      # 8) Deploy to Netlify
      - name: Deploy
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: _site
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
