name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'

      - name: Install system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R deps
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Clone and build CV PDF
        run: |
          git clone https://github.com/colerehbein/cv.git ../cv
          cd ../cv
          quarto add mps9506/quarto-cv --no-prompt
          quarto render CV.qmd --to pdf

      - name: Render site
        run: quarto render

      - name: Copy CV PDF
        run: |
          if [ -f ../cv/_site/CV.pdf ]; then
            cp ../cv/_site/CV.pdf _site/CV.pdf
          elif [ -f ../cv/CV.pdf ]; then
            cp ../cv/CV.pdf _site/CV.pdf
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
